name: Build and publish to deploy/staging

on:
  push:
    branches: [staging]
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
      - run: npm run build

      - name: Publish dist/ to deploy/staging branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: deploy/staging
          clean: true
          single-commit: false
          commit-message: "deploy: ${{ github.sha }}"
