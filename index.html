<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#3BB5C7" />

    <title>U-CALM Concierge — Consider it done.</title>
    <meta name="description" content="U-CALM Concierge is a lifestyle management and concierge house. Quiet, thorough, restored peace of mind — consider it done." />
    <meta name="author" content="U-CALM Concierge" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" sizes="any" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="sitemap" type="application/xml" href="/sitemap.xml" />

    <!-- Canonical host guard: the .pages.dev alias must never accrue its own
         index — redirect to the custom domain before anything renders. -->
    <script>
      if (location.hostname.endsWith(".pages.dev")) {
        location.replace("https://u-calm.com" + location.pathname + location.search + location.hash);
      }
    </script>

    <!-- Fonts: Cormorant Garamond (display) + Lato (body fallback for Gill Sans) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500&family=Lato:ital,wght@0,300;0,400;0,700;1,300;1,400&display=swap" rel="stylesheet" />

    <!-- Open Graph (baseline — per-page React hook overwrites once JS runs) -->
    <meta property="og:title" content="U-CALM Concierge — Consider it done." />
    <meta property="og:description" content="A quiet concierge and lifestyle-management house. From Lugano, in four working languages." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://u-calm.com/" />
    <meta property="og:site_name" content="U-CALM Concierge" />
    <meta property="og:image" content="https://u-calm.com/og/default.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="U-CALM Concierge — Consider it done." />
    <meta property="og:locale" content="en_GB" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="U-CALM Concierge — Consider it done." />
    <meta name="twitter:description" content="A quiet concierge and lifestyle-management house." />
    <meta name="twitter:image" content="https://u-calm.com/og/default.png" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
